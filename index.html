<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&M Energy - Sistema de Documentos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --blue-dark: #1b3a5c;
    --blue-mid: #1e5799;
    --blue-light: #2980b9;
    --orange: #e67e22;
    --orange-light: #f39c12;
    --green: #27ae60;
    --silver: #bdc3c7;
    --white: #f8fafc;
    --gray-light: #ecf0f1;
    --gray: #95a5a6;
    --text-dark: #1a1a2e;
    --invoice-color: #c0392b;
    --quote-color: #1e5799;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b3a5c 50%, #0d1b2a 100%);
    min-height: 100vh;
    color: var(--white);
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(90deg, var(--navy) 0%, var(--blue-dark) 100%);
    border-bottom: 3px solid var(--orange);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header-logo { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--orange); }
  .header-title h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; color: var(--white); }
  .header-title p { font-size: 0.75rem; color: var(--silver); letter-spacing: 1px; text-transform: uppercase; }

  /* ===== DOC TYPE SELECTOR (big toggle in header) ===== */
  .doc-type-selector {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .doc-type-btn {
    padding: 10px 22px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.25s;
    background: transparent;
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .doc-type-btn .icon { font-size: 1.2rem; }
  .doc-type-btn.active-quote {
    background: var(--blue-mid);
    color: #fff;
    box-shadow: 0 2px 12px rgba(30,87,153,0.5);
  }
  .doc-type-btn.active-invoice {
    background: var(--invoice-color);
    color: #fff;
    box-shadow: 0 2px 12px rgba(192,57,43,0.5);
  }
  .doc-type-btn:not(.active-quote):not(.active-invoice):hover { color: rgba(255,255,255,0.8); }

  /* ===== MAIN LAYOUT ===== */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    min-height: calc(100vh - 101px);
  }

  /* ===== LEFT PANEL ===== */
  .panel-left {
    background: rgba(13,27,42,0.95);
    border-right: 2px solid rgba(230,126,34,0.3);
    overflow-y: auto;
    height: calc(100vh - 101px);
    position: sticky;
    top: 0;
  }
  .panel-section { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .panel-section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(230,126,34,0.3); }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 0.72rem; color: var(--silver); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--white);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: var(--orange); background: rgba(255,255,255,0.12);
  }
  .form-group textarea { resize: vertical; min-height: 56px; }
  .form-group select option { background: var(--navy); color: var(--white); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ===== ITEM SEARCH ===== */
  .search-box { position: relative; }
  .search-box input { padding-left: 32px; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 0.9rem; }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--navy); border: 1px solid var(--orange);
    border-radius: 0 0 6px 6px; max-height: 200px; overflow-y: auto; z-index: 100; display: none;
  }
  .search-results.active { display: block; }
  .search-result-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
  .search-result-item:hover { background: rgba(230,126,34,0.15); }
  .search-result-item .item-code { font-size: 0.7rem; color: var(--orange); font-weight: 600; }
  .search-result-item .item-desc { font-size: 0.8rem; color: var(--white); }
  .search-result-item .item-price { font-size: 0.7rem; color: var(--green); }

  .btn {
    padding: 9px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.88rem;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; margin-top: 6px;
  }
  .btn-orange { background: var(--orange); color: var(--white); }
  .btn-orange:hover { background: var(--orange-light); transform: translateY(-1px); }
  .btn-blue { background: var(--blue-mid); color: var(--white); }
  .btn-blue:hover { background: var(--blue-light); }
  .btn-green { background: var(--green); color: var(--white); }
  .btn-green:hover { background: #2ecc71; }
  .btn-red { background: #c0392b; color: var(--white); padding: 5px 9px; font-size: 0.78rem; width: auto; margin-top: 0; }
  .btn-red:hover { background: #e74c3c; }
  .btn-sm { padding: 5px 9px; font-size: 0.73rem; margin-top: 0; width: auto; }
  .qty-price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ===== RIGHT PANEL ===== */
  .panel-right { padding: 20px; overflow-y: auto; }
  .panel-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); }
  .tab { padding: 9px 22px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.88rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab:hover { color: var(--white); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .quote-actions { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .quote-actions .btn { width: auto; }

  /* ===== DOCUMENT PREVIEW ===== */
  #quotePreview {
    background: var(--white);
    color: var(--text-dark);
    border-radius: 8px;
    padding: 32px 36px;
    max-width: 860px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    font-family: 'Inter', sans-serif;
  }

  /* Document type indicator bar */
  .doc-type-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 7px 16px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
  }
  .doc-type-banner.quote-banner { background: linear-gradient(90deg, var(--blue-dark), var(--blue-mid)); }
  .doc-type-banner.invoice-banner { background: linear-gradient(90deg, #922b21, var(--invoice-color)); }

  .doc-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .doc-header-border-quote { border-bottom: 3px solid var(--blue-mid); }
  .doc-header-border-invoice { border-bottom: 3px solid var(--invoice-color); }

  .doc-logo { width: 80px; height: 80px; border-radius: 50%; }
  .doc-company h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--blue-dark); letter-spacing: 1px; }
  .doc-company p { font-size: 0.75rem; color: #555; line-height: 1.6; }

  .doc-number-box {
    color: var(--white);
    padding: 12px 18px;
    border-radius: 6px;
    text-align: center;
    min-width: 150px;
  }
  .doc-number-box.quote-box { background: var(--blue-dark); }
  .doc-number-box.invoice-box { background: var(--invoice-color); }
  .doc-number-box .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.7); margin-bottom: 3px; }
  .doc-number-box .number { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
  .doc-number-box .date { font-size: 0.7rem; color: rgba(255,255,255,0.8); margin-top: 3px; }

  .doc-client-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; background: #f7f9fc; border-radius: 6px; padding: 12px 14px; border: 1px solid #e8edf2; }
  .doc-field { display: flex; align-items: baseline; gap: 6px; padding: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #eee; }
  .doc-field .field-label { font-weight: 700; color: #444; min-width: 80px; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.5px; flex-shrink: 0; }
  .doc-field .field-value { color: #1a1a2e; }

  .doc-detail-row { background: #f0f5ff; padding: 7px 10px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid var(--blue-mid); font-size: 0.8rem; color: #333; }

  .doc-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.79rem; }
  .doc-table thead tr { color: var(--white); }
  .doc-table thead.quote-head tr { background: var(--navy); }
  .doc-table thead.invoice-head tr { background: #7b241c; }
  .doc-table thead th { padding: 9px 10px; text-align: left; font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; }
  .doc-table tbody tr { border-bottom: 1px solid #e8e8e8; }
  .doc-table tbody tr:nth-child(even) { background: #fafbfd; }
  .doc-table tbody td { padding: 7px 10px; color: #222; }
  .doc-table tbody td:nth-child(1) { color: #888; font-size: 0.74rem; }

  .doc-category-row td {
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 10px !important;
  }
  .doc-category-row.quote-cat td { background: #dbeafe; color: #1e3a5f !important; }
  .doc-category-row.invoice-cat td { background: #fde8e8; color: #7b241c !important; }

  .doc-totals { width: 100%; margin-top: 14px; }
  .doc-totals table { width: 100%; border-collapse: collapse; }
  .doc-totals td { padding: 5px 10px; font-size: 0.82rem; color: #333; }
  .doc-totals td:first-child { width: 65%; }
  .doc-totals td:last-child { text-align: right; font-weight: 600; }
  .doc-totals .total-final td { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--white); padding: 9px 10px; }
  .doc-totals .total-final.quote-total td { background: var(--navy); }
  .doc-totals .total-final.invoice-total td { background: #7b241c; }

  .doc-footer { margin-top: 20px; text-align: center; font-size: 0.72rem; color: #777; border-top: 1px solid #e0e0e0; padding-top: 10px; }

  .doc-validity-row { background: #fff8e7; border: 1px solid #f0c040; border-radius: 4px; padding: 6px 12px; margin-top: 10px; font-size: 0.78rem; color: #7a5800; display: flex; align-items: center; gap: 6px; }

  /* ===== QUOTE ITEMS TABLE ===== */
  .quote-items-table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 8px; overflow: hidden; margin-bottom: 18px; }
  .quote-items-table thead tr { background: rgba(30,87,153,0.7); }
  .quote-items-table thead th { padding: 10px 11px; text-align: left; font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; letter-spacing: 1px; color: var(--white); text-transform: uppercase; }
  .quote-items-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
  .quote-items-table tbody tr:hover { background: rgba(255,255,255,0.06); }
  .quote-items-table tbody td { padding: 8px 11px; font-size: 0.82rem; color: var(--silver); }
  .quote-items-table input[type="number"], .quote-items-table input[type="text"] { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--white); padding: 4px 7px; border-radius: 4px; font-size: 0.8rem; width: 90px; }
  .quote-items-table input:focus { outline: none; border-color: var(--orange); }

  .totals-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 14px 18px; max-width: 300px; margin-left: auto; }
  .totals-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.86rem; color: var(--silver); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .totals-row.total-final { font-family: 'Rajdhani', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--orange); margin-top: 4px; border-bottom: none; }
  .totals-row .value { font-weight: 600; }

  /* ===== DATABASE TAB ===== */
  .db-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .db-toolbar input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--white); padding: 8px 13px; border-radius: 6px; font-size: 0.86rem; flex: 1; min-width: 180px; }
  .db-toolbar input:focus { outline: none; border-color: var(--orange); }
  .db-table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 8px; overflow: hidden; }
  .db-table thead tr { background: rgba(230,126,34,0.8); }
  .db-table thead th { padding: 10px 13px; text-align: left; font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--white); }
  .db-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
  .db-table tbody tr:hover { background: rgba(255,255,255,0.07); }
  .db-table tbody td { padding: 8px 13px; font-size: 0.82rem; color: var(--silver); }
  .db-table tbody td:first-child { color: var(--orange); font-weight: 600; }
  .db-table .db-actions { display: flex; gap: 6px; }
  .db-table input[type="text"], .db-table input[type="number"] { background: rgba(255,255,255,0.12); border: 1px solid rgba(230,126,34,0.6); color: var(--white); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; width: 100%; }

  /* ===== MODAL ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--navy); border: 2px solid var(--orange); border-radius: 10px; padding: 28px; min-width: 380px; max-width: 480px; width: 90%; }
  .modal h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--orange); margin-bottom: 18px; letter-spacing: 1px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; }

  .empty-state { text-align: center; padding: 40px; color: var(--gray); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; }

  .notification { position: fixed; top: 18px; right: 18px; background: var(--green); color: var(--white); padding: 10px 18px; border-radius: 6px; font-weight: 600; font-size: 0.88rem; z-index: 9999; display: none; animation: slideIn 0.3s ease; }
  .notification.error { background: #c0392b; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .iva-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .iva-toggle { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: 0.82rem; color: var(--silver); }
  .iva-toggle input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--orange); cursor: pointer; }
  .quote-counter { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 2px 9px; font-size: 0.76rem; color: var(--orange); font-weight: 700; }

  /* Selected item info box */
  #selectedItemInfo { display:none; background:rgba(39,174,96,0.15); border:1px solid rgba(39,174,96,0.4); border-radius:6px; padding:9px 11px; margin-bottom:9px; font-size:0.8rem; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  ::-webkit-scrollbar-thumb { background: rgba(230,126,34,0.5); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(230,126,34,0.8); }

  /* ===== PRINT / PDF STYLES ===== */
  @media print {
    body { background: white !important; }
    .header, .main > .panel-left, .panel-tabs, .quote-actions, .notification { display: none !important; }
    .panel-right { padding: 0 !important; }
    #quotePreview { box-shadow: none !important; max-width: 100% !important; padding: 15mm 15mm !important; }
  }
</style>
</head>
<body>

<div class="notification" id="notification"></div>

<!-- HEADER -->
<header class="header">
  <img src="" alt="H&M Energy" class="header-logo" id="headerLogo">
  <div class="header-title">
    <h1>H&M ENERGY</h1>
    <p>Solutions &amp; Products — Sistema de Documentos</p>
  </div>

  <!-- BIG DOC TYPE SELECTOR -->
  <div class="doc-type-selector" id="docTypeSelector">
    <button class="doc-type-btn active-quote" id="btnQuote" onclick="setDocType('COTIZACIÓN')">
      <span class="icon">📋</span> COTIZACIÓN
    </button>
    <button class="doc-type-btn" id="btnInvoice" onclick="setDocType('FACTURA')">
      <span class="icon">🧾</span> FACTURA
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left">

    <!-- Datos del documento -->
    <div class="panel-section">
      <div class="panel-section-title">📄 Documento</div>
      <!-- Hidden select to keep compatibility -->
      <select id="docType" style="display:none;">
        <option value="COTIZACIÓN">Cotización</option>
        <option value="FACTURA">Factura</option>
      </select>
      <div class="form-row">
        <div class="form-group">
          <label>N° Documento</label>
          <input type="text" id="docNumber" value="2026001">
        </div>
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="docDate">
        </div>
      </div>
      <div class="form-group">
        <label>Vigencia (días)</label>
        <input type="number" id="docValidity" value="30" style="width:120px;">
      </div>
    </div>

    <!-- Datos del cliente -->
    <div class="panel-section">
      <div class="panel-section-title">👤 Cliente</div>
      <div class="form-group">
        <label>Empresa / Nombre</label>
        <input type="text" id="clientName" placeholder="Nombre del cliente">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CC / NIT</label>
          <input type="text" id="clientNit" placeholder="NIT o Cédula">
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <input type="text" id="clientCity" placeholder="Ciudad">
        </div>
      </div>
      <div class="form-group">
        <label>Dirección</label>
        <input type="text" id="clientAddress" placeholder="Dirección">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="clientPhone" placeholder="Teléfono">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="clientEmail" placeholder="correo@email.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ATN (Contacto)</label>
          <input type="text" id="clientAtn" placeholder="Persona de contacto">
        </div>
        <div class="form-group">
          <label>Comercial</label>
          <input type="text" id="docSeller" placeholder="Vendedor">
        </div>
      </div>
      <div class="form-group">
        <label>Detalle / Proyecto</label>
        <textarea id="docDetail" placeholder="Descripción del servicio o proyecto..."></textarea>
      </div>
    </div>

    <!-- Agregar ítems -->
    <div class="panel-section">
      <div class="panel-section-title">➕ Agregar Ítem</div>
      <div class="form-group" style="position:relative;">
        <label>Buscar en base de datos</label>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="itemSearch" placeholder="Código o descripción..." autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
      <div id="selectedItemInfo">
        <span style="color:#2ecc71; font-weight:600;" id="selectedItemCode"></span>
        <span style="color:#fff;" id="selectedItemDesc"></span>
      </div>
      <div class="form-group">
        <label>Descripción del concepto</label>
        <textarea id="itemDescription" rows="2" placeholder="Descripción del ítem (editable)..."></textarea>
      </div>
      <div class="qty-price-row">
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="itemQty" value="1" min="1">
        </div>
        <div class="form-group">
          <label>Unidad</label>
          <input type="text" id="itemUnit" value="UND" placeholder="UND, M, KG...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Precio Unitario ($)</label>
          <input type="number" id="itemPrice" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select id="itemCategory">
            <option value="MATERIALES">Materiales</option>
            <option value="SERVICIO">Servicio</option>
            <option value="MANO DE OBRA">Mano de Obra</option>
            <option value="EQUIPOS">Equipos</option>
            <option value="TRANSPORTE">Transporte</option>
            <option value="OTROS">Otros</option>
          </select>
        </div>
      </div>
      <button class="btn btn-orange" onclick="addItemToQuote()">➕ AGREGAR AL DOCUMENTO</button>
    </div>

    <!-- Configuración -->
    <div class="panel-section">
      <div class="panel-section-title">💰 Configuración</div>
      <div class="iva-row">
        <label class="iva-toggle">
          <input type="checkbox" id="applyIva" onchange="updateTotals()">
          Aplicar IVA (19%)
        </label>
      </div>
      <div class="form-group">
        <label>Notas / Términos</label>
        <textarea id="docNotes" placeholder="Condiciones, forma de pago, observaciones..." rows="3"></textarea>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="panel-tabs">
      <div class="tab active" onclick="switchTab('quote')">📋 Items <span class="quote-counter" id="itemCounter">0</span></div>
      <div class="tab" onclick="switchTab('preview')">👁️ Vista Previa</div>
      <div class="tab" onclick="switchTab('database')">🗄️ Base de Datos</div>
    </div>

    <!-- TAB: QUOTE EDITOR -->
    <div class="tab-content active" id="tab-quote">
      <div class="quote-actions">
        <button class="btn btn-blue" style="width:auto;" onclick="switchTab('preview')">👁️ Vista Previa</button>
        <button class="btn btn-green" style="width:auto;" onclick="downloadPDF()">⬇️ Descargar PDF</button>
        <button class="btn btn-red btn-sm" onclick="clearQuote()" style="margin-top:0;">🗑️ Limpiar</button>
      </div>
      <div id="quoteItemsContainer">
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>Busca y agrega ítems desde el panel izquierdo</p>
        </div>
      </div>
      <div id="totalsContainer" style="display:none;">
        <div class="totals-box">
          <div class="totals-row"><span class="label">Subtotal</span><span class="value" id="subtotalDisplay">$0</span></div>
          <div class="totals-row" id="ivaRow" style="display:none;"><span class="label">IVA (19%)</span><span class="value" id="ivaDisplay">$0</span></div>
          <div class="totals-row total-final"><span class="label">TOTAL</span><span class="value" id="totalDisplay">$0</span></div>
        </div>
      </div>
    </div>

    <!-- TAB: PREVIEW -->
    <div class="tab-content" id="tab-preview">
      <div class="quote-actions">
        <button class="btn btn-green" style="width:auto;" onclick="downloadPDF()">⬇️ Descargar PDF</button>
        <button class="btn btn-blue" style="width:auto;" onclick="switchTab('quote')">← Editar</button>
      </div>
      <div id="quotePreview"></div>
    </div>

    <!-- TAB: DATABASE -->
    <div class="tab-content" id="tab-database">
      <div class="db-toolbar">
        <input type="text" id="dbSearch" placeholder="🔍 Buscar en base de datos..." oninput="renderDatabase()">
        <button class="btn btn-orange" style="width:auto;" onclick="openAddModal()">➕ Nuevo Ítem</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="db-table" id="dbTable">
          <thead>
            <tr>
              <th>Código</th>
              <th>Descripción</th>
              <th>Precio Unit.</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="dbTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Agregar ítem DB -->
<div class="modal-overlay" id="addModal">

    <h3>➕ Nuevo Ítem en BD</h3>
    <div class="form-group">
      <label>Código</label>
      <input type="text" id="modalCode" placeholder="001">

  </div>
</div>

function setDocType(type) {
  document.getElementById('docType').value = type;
  const btnQ = document.getElementById('btnQuote');
  const btnI = document.getElementById('btnInvoice');
  if (type === 'COTIZACIÓN') {
    btnQ.className = 'doc-type-btn active-quote';
    btnI.className = 'doc-type-btn';
  } else {
    btnQ.className = 'doc-type-btn';
    btnI.className = 'doc-type-btn active-invoice';
  }
  saveToStorage();
  // Update header badge if on preview
  if (document.getElementById('tab-preview').classList.contains('active')) buildPreview();
}

window.onload = () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('docDate').value = today;
  document.getElementById('headerLogo').src = 'data:image/jpeg;base64,' + LOGO_B64;
  loadFromStorage();
  renderDatabase();
  setupItemSearch();
};

function loadFromStorage() {
  const saved = localStorage.getItem('hym_database');
  if (saved) database = JSON.parse(saved);
  const savedItems = localStorage.getItem('hym_quote_items');
  if (savedItems) { quoteItems = JSON.parse(savedItems); renderQuoteItems(); }
  const savedDoc = localStorage.getItem('hym_doc_info');
  if (savedDoc) {
    const d = JSON.parse(savedDoc);
    Object.keys(d).forEach(k => {
      const el = document.getElementById(k);
      if (el) el.value = d[k];
    });
    // Sync docType button state
    const dt = document.getElementById('docType').value;
    if (dt) setDocType(dt);
  }
}

function saveToStorage() {
  localStorage.setItem('hym_database', JSON.stringify(database));
  localStorage.setItem('hym_quote_items', JSON.stringify(quoteItems));
  const fields = ['docType','docNumber','docDate','docValidity','clientName','clientNit','clientCity','clientAddress','clientPhone','clientEmail','clientAtn','docSeller','docDetail','docNotes'];
  const docInfo = {};
  fields.forEach(f => { const el = document.getElementById(f); if(el) docInfo[f] = el.value; });
  localStorage.setItem('hym_doc_info', JSON.stringify(docInfo));
}

// ==========================================
// ITEM SEARCH
// ==========================================
let selectedDbItem = null;

function setupItemSearch() {
  const searchInput = document.getElementById('itemSearch');
  const resultsDiv = document.getElementById('searchResults');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (q.length < 1) { resultsDiv.classList.remove('active'); return; }
    const matches = database.filter(item =>
      item.code.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)
    ).slice(0, 10);
    if (matches.length === 0) { resultsDiv.classList.remove('active'); return; }
    resultsDiv.innerHTML = matches.map(item => `
      <div class="search-result-item" onclick="selectDbItem('${item.code}')">
        <div class="item-code">${item.code}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-price">${item.price > 0 ? '$' + fmt(item.price) : 'Sin precio base'}</div>
      </div>
    `).join('');
    resultsDiv.classList.add('active');
  });
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
      resultsDiv.classList.remove('active');
    }
  });
}

function selectDbItem(code) {
  const item = database.find(d => d.code === code);
  if (!item) return;
  selectedDbItem = item;
  document.getElementById('itemSearch').value = item.desc;
  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('itemDescription').value = item.desc;
  document.getElementById('itemPrice').value = item.price > 0 ? item.price : '';
  document.getElementById('selectedItemCode').textContent = '[' + item.code + '] ';
  document.getElementById('selectedItemDesc').textContent = item.desc;
  document.getElementById('selectedItemInfo').style.display = 'block';
  document.getElementById('itemQty').focus();
}

// ==========================================
// QUOTE ITEMS
// ==========================================
function addItemToQuote() {
  const desc = document.getElementById('itemDescription').value.trim();
  const qty = parseFloat(document.getElementById('itemQty').value) || 1;
  const unit = document.getElementById('itemUnit').value.trim() || 'UND';
  const price = parseFloat(document.getElementById('itemPrice').value) || 0;
  const category = document.getElementById('itemCategory').value;
  if (!desc) { showNotif('Ingresa la descripción del ítem', true); return; }
  if (price <= 0) { showNotif('Ingresa un precio válido', true); return; }
  quoteItems.push({ id: Date.now(), code: selectedDbItem ? selectedDbItem.code : '', desc, qty, unit, price, category, total: qty * price });
  document.getElementById('itemDescription').value = '';
  document.getElementById('itemQty').value = '1';
  document.getElementById('itemPrice').value = '';
  document.getElementById('itemSearch').value = '';
  document.getElementById('selectedItemInfo').style.display = 'none';
  selectedDbItem = null;
  renderQuoteItems();
  updateTotals();
  saveToStorage();
  showNotif('Ítem agregado ✓');
}

function removeItem(id) {
  quoteItems = quoteItems.filter(i => i.id !== id);
  renderQuoteItems(); updateTotals(); saveToStorage();
}

function updateItemField(id, field, value) {
  const item = quoteItems.find(i => i.id === id);
  if (!item) return;
  item[field] = field === 'desc' || field === 'unit' ? value : parseFloat(value) || 0;
  item.total = item.qty * item.price;
  updateTotals(); saveToStorage();
  const totalCell = document.getElementById('total_' + id);
  if (totalCell) totalCell.textContent = '$' + fmt(item.total);
}

function renderQuoteItems() {
  const container = document.getElementById('quoteItemsContainer');
  const counter = document.getElementById('itemCounter');
  counter.textContent = quoteItems.length;
  if (quoteItems.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Busca y agrega ítems desde el panel izquierdo</p></div>';
    document.getElementById('totalsContainer').style.display = 'none';
    return;
  }
  document.getElementById('totalsContainer').style.display = 'block';
  const categories = [...new Set(quoteItems.map(i => i.category))];
  let html = `<table class="quote-items-table">
    <thead><tr>
      <th>#</th><th>Descripción</th><th>Cant.</th><th>Unidad</th><th>Precio Unit.</th><th>Total</th><th></th>
    </tr></thead><tbody>`;
  let num = 1;
  categories.forEach(cat => {
    const catItems = quoteItems.filter(i => i.category === cat);
    html += `<tr style="background:rgba(230,126,34,0.15);">
      <td colspan="7" style="font-family:'Rajdhani',sans-serif;font-weight:700;color:#f39c12;font-size:0.8rem;letter-spacing:1px;padding:6px 11px;text-transform:uppercase;">${cat}</td>
    </tr>`;
    catItems.forEach(item => {
      html += `<tr>
        <td style="color:#888;">${num++}</td>
        <td><input type="text" value="${escHtml(item.desc)}" style="width:100%;min-width:160px;" onchange="updateItemField(${item.id},'desc',this.value)"></td>
        <td><input type="number" value="${item.qty}" min="1" style="width:65px;" oninput="updateItemField(${item.id},'qty',this.value);document.getElementById('total_${item.id}').textContent='$'+fmt(parseFloat(this.value||1)*${item.price})"></td>
        <td><input type="text" value="${item.unit}" style="width:60px;" onchange="updateItemField(${item.id},'unit',this.value)"></td>
        <td><input type="number" value="${item.price}" min="0" style="width:95px;" oninput="updateItemField(${item.id},'price',this.value);document.getElementById('total_${item.id}').textContent='$'+fmt(${item.qty}*parseFloat(this.value||0))"></td>
        <td style="color:#2ecc71;font-weight:600;" id="total_${item.id}">$${fmt(item.total)}</td>
        <td><button class="btn btn-red btn-sm" onclick="removeItem(${item.id})">✕</button></td>
      </tr>`;
    });
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function updateTotals() {
  const subtotal = quoteItems.reduce((s, i) => s + i.total, 0);
  const applyIva = document.getElementById('applyIva').checked;
  const iva = applyIva ? subtotal * 0.19 : 0;
  const total = subtotal + iva;
  document.getElementById('subtotalDisplay').textContent = '$' + fmt(subtotal);
  document.getElementById('ivaDisplay').textContent = '$' + fmt(iva);
  document.getElementById('totalDisplay').textContent = '$' + fmt(total);
  document.getElementById('ivaRow').style.display = applyIva ? 'flex' : 'none';
}

function clearQuote() {
  if (!confirm('¿Limpiar todos los ítems?')) return;
  quoteItems = [];
  renderQuoteItems(); updateTotals(); saveToStorage();
  showNotif('Lista limpiada');
}

// ==========================================
// DATABASE TAB
// ==========================================
function renderDatabase() {
  const search = (document.getElementById('dbSearch')?.value || '').toLowerCase();
  const tbody = document.getElementById('dbTableBody');
  const filtered = database.filter(i =>
    i.code.toLowerCase().includes(search) || i.desc.toLowerCase().includes(search)
  );
  tbody.innerHTML = filtered.map((item, idx) => {
    const realIdx = database.indexOf(item);
    return `<tr>
      <td>${item.code}</td>
      <td>${item.desc}</td>
      <td>$${fmt(item.price)}</td>
      <td>
        <div class="db-actions">
          <button class="btn btn-blue btn-sm" onclick="editDbItem(${realIdx})">✏️</button>
          <button class="btn btn-red btn-sm" onclick="deleteDbItem(${realIdx})">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function editDbItem(idx) {
  const item = database[idx];
  const tr = document.getElementById('dbTableBody').children[
    [...document.getElementById('dbTableBody').children].findIndex(r => r.querySelector('button') && r.querySelector('button').getAttribute('onclick') === `editDbItem(${idx})`)
  ];
  if (!tr) return;
  tr.innerHTML = `
    <td><input type="text" value="${item.code}" id="edit_code_${idx}" style="width:80px;"></td>
    <td><input type="text" value="${item.desc}" id="edit_desc_${idx}"></td>
    <td><input type="number" value="${item.price}" id="edit_price_${idx}" style="width:110px;"></td>
    <td><div class="db-actions">
      <button class="btn btn-green btn-sm" onclick="saveDbItem(${idx})">✔</button>
      <button class="btn btn-red btn-sm" onclick="renderDatabase()">✕</button>
    </div></td>`;
}

function saveDbItem(idx) {
  database[idx] = {
    code: document.getElementById('edit_code_' + idx).value.trim(),
    desc: document.getElementById('edit_desc_' + idx).value.trim(),
    price: parseFloat(document.getElementById('edit_price_' + idx).value) || 0
  };
  saveToStorage(); renderDatabase(); showNotif('Ítem actualizado ✓');
}

function deleteDbItem(idx) {
  if (!confirm('¿Eliminar este ítem?')) return;
  database.splice(idx, 1);
  saveToStorage(); renderDatabase(); showNotif('Ítem eliminado');
}

function openAddModal() {
  document.getElementById('modalCode').value = '';
  document.getElementById('modalDesc').value = '';
  document.getElementById('modalPrice').value = '';
  document.getElementById('addModal').classList.add('active');
}
function closeModal() { document.getElementById('addModal').classList.remove('active'); }
function saveNewItem() {
  const code = document.getElementById('modalCode').value.trim();
  const desc = document.getElementById('modalDesc').value.trim();
  const price = parseFloat(document.getElementById('modalPrice').value) || 0;
  if (!code || !desc) { showNotif('Completa código y descripción', true); return; }
  database.push({ code, desc, price });
  saveToStorage(); renderDatabase(); closeModal(); showNotif('Ítem agregado a la BD ✓');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['quote','preview','database'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach((t,i) => {
    t.classList.toggle('active', ['tab-quote','tab-preview','tab-database'][i] === 'tab-' + tab);
  });
  if (tab === 'preview') buildPreview();
  if (tab === 'database') renderDatabase();
}

function buildPreview() {
  const docType = document.getElementById('docType').value;
  const isInvoice = docType === 'FACTURA';
  const docNumber = document.getElementById('docNumber').value;
  const docDate = document.getElementById('docDate').value;
  const clientName = document.getElementById('clientName').value || '—';
  const clientNit = document.getElementById('clientNit').value || '—';
  const clientCity = document.getElementById('clientCity').value || '—';
  const clientAddress = document.getElementById('clientAddress').value || '—';
  const clientPhone = document.getElementById('clientPhone').value || '—';
  const clientEmail = document.getElementById('clientEmail').value || '—';
  const clientAtn = document.getElementById('clientAtn').value || '';
  const seller = document.getElementById('docSeller').value || '—';
  const detail = document.getElementById('docDetail').value || '';
  const notes = document.getElementById('docNotes').value || '';
  const docValidity = document.getElementById('docValidity').value || '30';
  const applyIva = document.getElementById('applyIva').checked;

  const subtotal = quoteItems.reduce((s, i) => s + i.total, 0);
  const iva = applyIva ? subtotal * 0.19 : 0;
  const total = subtotal + iva;

  const fmtDate = (d) => {
    if (!d) return '';
    const [y,m,dd] = d.split('-');
    return `${dd}/${m}/${y}`;
  };

  // Validity date
  let validityStr = '';
  if (!isInvoice && docDate) {
    const vDate = new Date(docDate);
    vDate.setDate(vDate.getDate() + parseInt(docValidity));
    const vy = vDate.getFullYear();
    const vm = String(vDate.getMonth()+1).padStart(2,'0');
    const vd = String(vDate.getDate()).padStart(2,'0');
    validityStr = `${vd}/${vm}/${vy}`;
  }

  const categories = [...new Set(quoteItems.map(i => i.category))];
  let itemRows = '';
  let num = 1;
  categories.forEach(cat => {
    const catItems = quoteItems.filter(i => i.category === cat);
    const catClass = isInvoice ? 'invoice-cat' : 'quote-cat';
    itemRows += `<tr class="doc-category-row ${catClass}"><td colspan="6">${cat}</td></tr>`;
    catItems.forEach(item => {
      itemRows += `<tr>
        <td style="text-align:center;">${num++}</td>
        <td>${escHtml(item.desc)}</td>
        <td style="text-align:center;">${item.qty}</td>
        <td style="text-align:center;">${item.unit}</td>
        <td style="text-align:right;">$${fmt(item.price)}</td>
        <td style="text-align:right;font-weight:600;">$${fmt(item.total)}</td>

    });

  const numBoxClass = isInvoice ? 'invoice-box' : 'quote-box';
  const borderClass = isInvoice ? 'doc-header-border-invoice' : 'doc-header-border-quote';
  const bannerClass = isInvoice ? 'invoice-banner' : 'quote-banner';
  const headClass = isInvoice ? 'invoice-head' : 'quote-head';
  const totalClass = isInvoice ? 'invoice-total' : 'quote-total';
  const docIcon = isInvoice ? '🧾' : '📋';
  const accentColor = isInvoice ? '#922b21' : '#1e5799';
  const detailBorderColor = isInvoice ? '#c0392b' : '#1e5799';

  const preview = document.getElementById('quotePreview');
  preview.innerHTML = `
    <div class="doc-type-banner ${bannerClass}">${docIcon} ${docType}</div>

    <div class="doc-header ${borderClass}">
      <img src="data:image/jpeg;base64,${LOGO_B64}" alt="H&M Energy" class="doc-logo" onerror="this.style.display='none'">
      <div class="doc-company">
        <h2 style="color:${accentColor}">H&amp;M ENERGY SOLUTIONS &amp; PRODUCTS</h2>
        <p>CALLE #12 – Puerto Escondido / Córdoba</p>
        <p>Teléfono: 316 699 3139</p>
        <p>ServiciosH&amp;M-Energy@gmail.com</p>
      </div>
      <div class="doc-number-box ${numBoxClass}">
        <div class="label">N° ${docType}</div>
        <div class="number">${escHtml(docNumber)}</div>
        <div class="date">📅 ${fmtDate(docDate)}</div>
      </div>
    </div>

    <div class="doc-client-grid">
      <div class="doc-field"><span class="field-label">Cliente:</span><span class="field-value">${escHtml(clientName)}</span></div>
      <div class="doc-field"><span class="field-label">CC / NIT:</span><span class="field-value">${escHtml(clientNit)}</span></div>
      ${clientAtn ? `<div class="doc-field"><span class="field-label">ATN:</span><span class="field-value">${escHtml(clientAtn)}</span></div>` : '<div class="doc-field"></div>'}
      <div class="doc-field"><span class="field-label">Ciudad:</span><span class="field-value">${escHtml(clientCity)}</span></div>
      <div class="doc-field"><span class="field-label">Dirección:</span><span class="field-value">${escHtml(clientAddress)}</span></div>
      <div class="doc-field"><span class="field-label">E-Mail:</span><span class="field-value">${escHtml(clientEmail)}</span></div>
      <div class="doc-field"><span class="field-label">Teléfonos:</span><span class="field-value">${escHtml(clientPhone)}</span></div>
      <div class="doc-field"><span class="field-label">Comercial:</span><span class="field-value">${escHtml(seller)}</span></div>
    </div>

    ${detail ? `<div class="doc-detail-row" style="border-left-color:${detailBorderColor}"><strong style="color:${accentColor}">Detalle:</strong> ${escHtml(detail)}</div>` : ''}

    <table class="doc-table">
      <thead class="${headClass}">
        <tr>
          <th style="text-align:center;width:32px;">#</th>
          <th>Concepto / Descripción</th>
          <th style="text-align:center;">Cant.</th>
          <th style="text-align:center;">Unidad</th>
          <th style="text-align:right;">Vr. Unitario</th>
          <th style="text-align:right;">Vr. Total</th>
        </tr>
      </thead>
      <tbody>
        ${itemRows || '<tr><td colspan="6" style="text-align:center;padding:20px;color:#888;">Sin ítems agregados</td></tr>'}

    </table>

    <div class="doc-totals">
      <table>
        <tr><td></td><td style="color:#555;">SUBTOTAL</td><td style="text-align:right;font-weight:600;color:#333;">$ ${fmt(subtotal)}</td></tr>
        ${applyIva ? `<tr><td></td><td style="color:#555;">IVA (19%)</td><td style="text-align:right;font-weight:600;color:#333;">$ ${fmt(iva)}</td></tr>` : ''}
        <tr class="total-final ${totalClass}"><td></td><td>TOTAL</td><td style="text-align:right;">$ ${fmt(total)}</td></tr>
      </table>
    </div>

    ${!isInvoice && validityStr ? `<div class="doc-validity-row">⏳ <strong>Vigencia de la cotización:</strong> Válida hasta el ${validityStr} (${docValidity} días)</div>` : ''}

    ${notes ? `<div style="margin-top:12px;padding:10px 12px;background:#f5f7fa;border-radius:4px;font-size:0.76rem;color:#555;border-left:3px solid ${detailBorderColor};">
      <strong style="color:${accentColor};">Notas / Términos:</strong><br>${escHtml(notes)}
    </div>` : ''}

    <div class="doc-footer">
      ¡Gracias por su confianza! — Si tiene alguna duda sobre esta ${docType.toLowerCase()}, contáctenos en ServiciosH&M-Energy@gmail.com
      <br><strong>H&amp;M Energy Solutions &amp; Products</strong> — Puerto Escondido, Córdoba
    </div>
  `;
}

// ==========================================
// PDF — Una sola hoja horizontal, adaptado al contenido
// ==========================================
async function downloadPDF() {
  buildPreview();
  await new Promise(r => setTimeout(r, 400));

  const element = document.getElementById('quotePreview');
  const docNum = document.getElementById('docNumber').value || 'doc';
  const clientName = document.getElementById('clientName').value || 'cliente';
  const docType = document.getElementById('docType').value.toLowerCase().replace('ó','o');

  showNotif('Generando PDF horizontal...');

  try {
    // Temporarily set a wide fixed width for clean capture
    const origStyle = element.getAttribute('style') || '';
    element.style.maxWidth = 'none';
    element.style.width = '1050px';
    element.style.padding = '24px 28px';

    await new Promise(r => setTimeout(r, 100));

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      logging: false,
      backgroundColor: '#ffffff',
      width: element.offsetWidth,
      height: element.offsetHeight,
    });

    // Restore original style
    element.setAttribute('style', origStyle);

    const { jsPDF } = window.jspdf;

    const imgWidth = canvas.width;
    const imgHeight = canvas.height;

    // A4 landscape in mm
    const pageW = 297;
    const pageH = 210;
    const margin = 8; // mm margin

    const availW = pageW - margin * 2;
    const availH = pageH - margin * 2;

    // Scale image to fit width
    const scale = availW / (imgWidth / 2); // divide by 2 because we used scale:2
    const scaledH = (imgHeight / 2) * scale;

    // Decide: does it fit in one landscape page?
    let pdf;
    if (scaledH <= availH) {
      // Fits in ONE landscape page perfectly
      pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const yOffset = (pageH - scaledH) / 2 - 2; // slightly above center
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, Math.max(margin, yOffset), availW, scaledH);
    } else {
      // Content is tall — use landscape but allow vertical content, fitting width
      // Use a custom tall landscape format
      const customH = scaledH + margin * 2;
      pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [pageW, customH] });
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, margin, availW, scaledH);
    }

    pdf.save(`HYM_${docType}_${docNum}_${clientName.replace(/\s+/g,'_')}.pdf`);
    showNotif('PDF descargado ✓');
  } catch(e) {
    console.error(e);
    showNotif('Error generando PDF. Intenta de nuevo.', true);
  }
}

// ==========================================
// UTILS
// ==========================================
function fmt(n) { return Math.round(n).toLocaleString('es-CO'); }
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showNotif(msg, isError = false) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.className = 'notification' + (isError ? ' error' : '');
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

document.addEventListener('input', (e) => {
  const fields = ['docNumber','docDate','docValidity','clientName','clientNit','clientCity','clientAddress','clientPhone','clientEmail','clientAtn','docSeller','docDetail','docNotes'];
  if (fields.includes(e.target.id)) saveToStorage();
});
